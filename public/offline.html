<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitLocal — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0a; color: #f3f4f6; font-family: 'Inter', system-ui, sans-serif; }
    .center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 1rem; padding: 2rem; text-align: center; }
    .icon { font-size: 3.5rem; }
    h1 { font-size: 1.4rem; font-weight: 700; }
    p { font-size: 0.9rem; color: #9ca3af; max-width: 24rem; line-height: 1.6; }
    button { margin-top: 0.5rem; padding: 0.75rem 2rem; border-radius: 0.75rem; background: #10b981; color: #fff; font-size: 0.9rem; font-weight: 600; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="center">
    <div class="icon">📴</div>
    <h1>Sem ligação / Offline</h1>
    <p>O FitLocal guarda tudo no dispositivo — os teus dados estão seguros. Liga-te à rede para abrir a app completa.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
